name: Deploy Production

# Railway et Vercel sont liés au repo GitHub : push sur main → auto-deploy
# par leurs intégrations Git natives (pas besoin de RAILWAY_TOKEN / VERCEL_TOKEN).
# Ce workflow s'occupe de : tests + migration DB + healthcheck + build APK + tag.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (urgence hotfix)'
        type: boolean
        default: false
      skip_migration:
        description: 'Skip Prisma migrate deploy'
        type: boolean
        default: false
      skip_healthcheck:
        description: "Skip healthcheck (n'attend pas Railway)"
        type: boolean
        default: false
      skip_webview:
        description: 'Skip Android WebView build'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. SYNC — Cohérence repo (lockfiles)
  # ─────────────────────────────────────────────────────────────
  sync:
    name: Sync repo & install
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify lockfiles present
        run: |
          for dir in src/backend src/frontend src/backoffice; do
            test -f "$dir/package-lock.json" || { echo "Missing lockfile in $dir"; exit 1; }
          done

  # ─────────────────────────────────────────────────────────────
  # 2. TESTS — Backend Jest (491 tests)
  # ─────────────────────────────────────────────────────────────
  tests:
    name: Tests backend
    needs: sync
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests != true }}
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_KEY_MOBILE: ${{ secrets.API_KEY_MOBILE }}
          API_KEY_CRM: ${{ secrets.API_KEY_CRM }}

  # ─────────────────────────────────────────────────────────────
  # 3. MIGRATION — Prisma migrate deploy (sur Supabase prod)
  # ─────────────────────────────────────────────────────────────
  migrate:
    name: Migration DB Prisma
    needs: [sync, tests]
    if: ${{ always() && needs.sync.result == 'success' && (needs.tests.result == 'success' || inputs.skip_tests == true) && inputs.skip_migration != true }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json
      - run: npm ci
      - name: prisma migrate deploy
        run: npx prisma migrate deploy
        env:
          # DIRECT_URL = pooler session port 5432 (IPv4, requis pour migrate)
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  # ─────────────────────────────────────────────────────────────
  # 4. HEALTHCHECK — Attend que Railway ait redéployé le backend
  # ─────────────────────────────────────────────────────────────
  healthcheck:
    name: Healthcheck backend (Railway auto-deploy)
    needs: [tests, migrate]
    if: ${{ always()
        && (needs.tests.result == 'success' || (needs.tests.result == 'skipped' && inputs.skip_tests == true))
        && (needs.migrate.result == 'success' || (needs.migrate.result == 'skipped' && inputs.skip_migration == true))
        && inputs.skip_healthcheck != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway redeploy + /health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL non configuré — skip healthcheck"
            exit 0
          fi
          # Railway peut prendre 1–3 min pour redéployer après push
          for i in $(seq 1 20); do
            if curl -fsS --max-time 10 "$BACKEND_URL/health"; then
              echo ""
              echo "✓ Backend healthy after $((i * 15))s"
              exit 0
            fi
            echo "Try $i KO — wait 15s..."
            sleep 15
          done
          echo "✗ Backend ne répond pas après 5 min"
          exit 1

  # ─────────────────────────────────────────────────────────────
  # 5. WEBVIEW — Build APK Android (versionName ← frontend package.json)
  # ─────────────────────────────────────────────────────────────
  build-webview:
    name: Build Android WebView APK
    needs: [sync, healthcheck]
    if: ${{ always()
        && needs.sync.result == 'success'
        && (needs.healthcheck.result == 'success' || needs.healthcheck.result == 'skipped')
        && inputs.skip_webview != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Récupérer l'historique complet pour `git rev-list --count HEAD` → versionCode monotone
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Le repo n'a que gradlew.bat — installer gradle directement
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      # 1/3 — Build frontend production (assets bundlés dans l'APK)
      - name: Build frontend (mode production)
        working-directory: src/frontend
        env:
          VITE_API_URL: ${{ secrets.BACKEND_URL }}
          VITE_API_KEY: ${{ secrets.API_KEY_MOBILE }}
        run: |
          npm ci
          npm run build
          ls -la dist/

      # 2/3 — Copier le build frontend dans les assets de la WebView
      - name: Copy frontend dist → android assets
        run: |
          rm -rf android-webview/app/src/main/assets
          mkdir -p android-webview/app/src/main/assets
          cp -r src/frontend/dist/* android-webview/app/src/main/assets/
          echo "Assets contents:"
          ls -la android-webview/app/src/main/assets/

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p android-webview/keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android-webview/keystore/release.keystore
          cat > android-webview/keystore/keystore.properties <<EOF
          storeFile=../keystore/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Compute version (sync avec frontend)
        id: version
        run: |
          FRONT_VERSION=$(node -p "require('./src/frontend/package.json').version")
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "name=$FRONT_VERSION" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE"  >> $GITHUB_OUTPUT
          echo "APK versionName=$FRONT_VERSION  versionCode=$VERSION_CODE"

      # 3/3 — Build APK avec le frontend prod embarqué
      - name: Build APK
        working-directory: android-webview
        run: |
          if [ -f keystore/release.keystore ]; then
            gradle assembleRelease --no-daemon -PversionCodeOverride=${{ steps.version.outputs.code }}
          else
            echo "Pas de keystore — build debug"
            gradle assembleDebug --no-daemon -PversionCodeOverride=${{ steps.version.outputs.code }}
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-apk-${{ needs.sync.outputs.short_sha }}
          path: |
            android-webview/app/build/outputs/apk/release/*.apk
            android-webview/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 6. TAG — git tag + résumé
  # ─────────────────────────────────────────────────────────────
  finalize:
    name: Tag & summary
    needs: [sync, tests, migrate, healthcheck, build-webview]
    if: ${{ always()
        && needs.sync.result == 'success'
        && (needs.tests.result == 'success' || needs.tests.result == 'skipped')
        && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
        && (needs.healthcheck.result == 'success' || needs.healthcheck.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag deployment
        run: |
          TAG="deploy-$(date -u +%Y%m%d-%H%M%S)-${{ needs.sync.outputs.short_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Production deploy ${{ needs.sync.outputs.short_sha }}"
          git push origin "$TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Summary
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ✅ Déploiement réussi

          | Étape | Statut |
          |-------|--------|
          | Tests backend | ${{ needs.tests.result }} |
          | Migration DB | ${{ needs.migrate.result }} |
          | Healthcheck Railway | ${{ needs.healthcheck.result }} |
          | WebView APK | ${{ needs.build-webview.result }} |

          - **Commit** : \`${{ needs.sync.outputs.short_sha }}\`
          - **Tag** : \`$TAG\`
          - **Backend** : $BACKEND_URL
          - **Vercel** : auto-déployé via intégration Git (frontend / backoffice)
          EOF
